<!DOCTYPE html>

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TNTT Loading Animation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #131313;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loading-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .scarf-stage {
            position: relative;
            width: 320px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scarf-item {
            position: absolute;
            width: 300px;
            opacity: 0;
            transform: translateX(-150%) scale(0.8);
            filter: drop-shadow(0 0 20px rgba(255, 179, 173, 0.2));
            animation: glideInOut 12s linear infinite;
        }

        @keyframes glideInOut {
            0% {
                transform: translateX(-150%) scale(0.8);
                opacity: 0;
            }
            2% {
                opacity: 1;
            }
            14% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
            18% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
            30% {
                transform: translateX(150%) scale(0.8);
                opacity: 0;
            }
            100% {
                transform: translateX(150%) scale(0.8);
                opacity: 0;
            }
        }

        /* Staggered Timing for 6 scarves over 12s duration */
        .scarf-1 { animation-delay: 0s; }
        .scarf-2 { animation-delay: 2s; }
        .scarf-3 { animation-delay: 4s; }
        .scarf-4 { animation-delay: 6s; }
        .scarf-5 { animation-delay: 8s; }
        .scarf-6 { animation-delay: 10s; }

        .loader-text {
            color: #ffb3ad; /* primary color from theme */
            font-weight: 700;
            letter-spacing: 0.2em;
            font-size: 1.25rem;
            animation: pulse 2s ease-in-out infinite;
            margin-top: 3rem;
            text-align: center;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .glow-overlay {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 84, 81, 0.15) 0%, rgba(255, 84, 81, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
